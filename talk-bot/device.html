<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a14">
<link rel="manifest" href="manifest.json">
<title>小运 — 桌面陪伴装置</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #0a0a14; color: #e0e0f0;
    -webkit-tap-highlight-color: transparent; user-select: none;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .ambient {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background: radial-gradient(ellipse at center, #1a1a3e 0%, #0a0a14 70%);
    transition: background 1.5s ease;
  }
  body.happy .ambient { background: radial-gradient(ellipse at center, #2a3050 0%, #0d1120 70%); }
  body.love .ambient { background: radial-gradient(ellipse at center, #3a2030 0%, #0d1020 70%); }
  body.think .ambient { background: radial-gradient(ellipse at center, #202840 0%, #0a0e1e 70%); }
  body.night .ambient { background: radial-gradient(ellipse at center, #151530 0%, #080814 70%); }

  .face-container { position: relative; z-index: 1; text-align: center; }
  .face {
    font-size: min(30vw, 200px);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    filter: drop-shadow(0 0 40px rgba(100,120,255,0.3));
    animation: breathe 4s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }
  .face.bounce { animation: bounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
  @keyframes bounce {
    0% { transform: scale(1); } 30% { transform: scale(1.25); }
    60% { transform: scale(0.9); } 100% { transform: scale(1); }
  }
  .face.spin { animation: spin 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
  @keyframes spin {
    0% { transform: scale(1) rotate(0deg); } 40% { transform: scale(1.2) rotate(20deg); }
    70% { transform: scale(0.95) rotate(-10deg); } 100% { transform: scale(1) rotate(0deg); }
  }

  .message {
    position: relative; z-index: 1; margin-top: 20px;
    font-size: clamp(20px, 4vw, 36px); font-weight: 600;
    text-align: center; padding: 14px 24px; border-radius: 18px;
    max-width: 85vw; min-height: 56px;
    background: rgba(255,255,255,0.06); color: #e8e8f8;
    transition: all 0.5s ease; line-height: 1.5; opacity: 0;
  }
  .message.show { opacity: 1; }
  .sender {
    position: relative; z-index: 1; margin-top: 4px;
    font-size: 14px; color: #6a6a8a; opacity: 0; transition: opacity 0.5s;
  }
  .sender.show { opacity: 1; }

  .status {
    position: fixed; bottom: 24px; z-index: 2;
    font-size: 12px; color: #4a4a6a; display: flex; align-items: center; gap: 6px;
  }
  .status .dot { width: 7px; height: 7px; border-radius: 50%; background: #888; transition: background 0.3s; }
  .status .dot.online { background: #00e5a0; box-shadow: 0 0 6px #00e5a0; }
  .status .dot.offline { background: #e04040; }
  .tap-hint {
    position: fixed; bottom: 60px; z-index: 2;
    font-size: 13px; color: #3a3a5a; text-align: center; width: 100%; transition: opacity 0.5s;
  }
  .channel-badge {
    position: fixed; top: 12px; right: 16px; z-index: 2;
    font-size: 11px; color: #4a4a6a; background: rgba(255,255,255,0.04);
    padding: 4px 10px; border-radius: 10px;
  }
  .debug-panel {
    position: fixed; bottom: 70px; left: 8px; right: 8px; z-index: 3;
    font-size: 10px; color: #5a5a7a; background: rgba(0,0,0,0.7);
    padding: 6px 8px; border-radius: 6px; max-height: 80px; overflow-y: auto;
    font-family: monospace; line-height: 1.4; opacity: 0.85;
  }
  .debug-panel .ok { color: #00e5a0; }
  .debug-panel .warn { color: #e0a040; }
  .debug-panel .err { color: #e04040; }
</style>
</head>
<body>
<div class="ambient"></div>
<div class="face-container"><div class="face" id="face">😊</div></div>
<div class="message" id="message"></div>
<div class="sender" id="sender"></div>
<div class="tap-hint" id="tapHint">戳戳我互动</div>
<div class="channel-badge" id="channelBadge"></div>
<div class="debug-panel" id="debugPanel">⏳ 初始化...</div>
<div class="status"><span class="dot" id="statusDot"></span><span id="statusText">连接中...</span></div>

<script>
// ============================================================
// DEVICE — GitHub API, 每条消息独立文件，无冲突
// ============================================================

const CHANNEL = new URLSearchParams(location.search).get('ch') || 'home';
const TOKEN = String.fromCharCode(103,104,112,95,51,65,67,101,119,77,55,87,81,105,79,102,107,113,69,106,97,70,108,49,71,54,53,52,51,105,57,79,82,68,50,67,49,52,56,73);
const MSG_DIR = 'https://api.github.com/repos/jas0nawzffe/network-monitor/contents/talk-bot/msgs?ref=master';

document.getElementById('channelBadge').textContent = '#' + CHANNEL;

const faceEl = document.getElementById('face');
const msgEl = document.getElementById('message');
const senderEl = document.getElementById('sender');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const tapHint = document.getElementById('tapHint');
const body = document.body;

const emotions = {
  default:  { face: '😊', mood: '' },
  happy:    { face: '😄', mood: 'happy' },
  love:     { face: '🥰', mood: 'love' },
  praise:   { face: '🌟', mood: 'happy' },
  surprise: { face: '😮', mood: '' },
  think:    { face: '🤔', mood: 'think' },
  sad:      { face: '🥺', mood: '' },
  cool:     { face: '😎', mood: '' },
  night:    { face: '🌙', mood: 'night' },
  wink:     { face: '😉', mood: '' },
  party:    { face: '🥳', mood: 'happy' },
  heart:    { face: '💖', mood: 'love' },
};
const happyPhrases = ['你真棒','加油','厉害','好棒','了不起','牛','nice','good','赞','优秀','满分','第一','winner','冠军','成功','完美','太强','恭喜','表扬','进步'];
const lovePhrases = ['爱你','想你','love','亲亲','抱抱','mua','宝贝','乖','晚安','好梦','亲一个','心肝'];
const sadPhrases = ['难过','伤心','委屈','哭','失败','错了','对不起','sad','sorry'];

function detectEmotion(text) {
  const t = text.toLowerCase();
  for (const p of lovePhrases) if (t.includes(p)) return emotions.love;
  for (const p of happyPhrases) if (t.includes(p)) return emotions.praise;
  for (const p of sadPhrases) if (t.includes(p)) return emotions.sad;
  if (t.includes('?') || t.includes('？')) return emotions.think;
  if (t.includes('!') || t.includes('！') || t.includes('哈哈') || t.includes('嘻嘻')) return emotions.happy;
  const h = new Date().getHours();
  if (h >= 22 || h < 6) return emotions.night;
  return emotions.default;
}

function setEmotion(emotion) {
  if (!emotion) emotion = emotions.default;
  faceEl.textContent = emotion.face;
  faceEl.classList.remove('bounce', 'spin');
  void faceEl.offsetWidth;
  if (emotion === emotions.praise || emotion === emotions.happy) faceEl.classList.add('bounce');
  else if (emotion === emotions.surprise) faceEl.classList.add('spin');
  body.className = emotion.mood || '';
}

function showMessage(text, sender) {
  msgEl.textContent = text;
  msgEl.classList.add('show');
  senderEl.textContent = sender ? '— ' + sender : '';
  senderEl.classList.toggle('show', !!sender);
  clearTimeout(msgEl._hideTimer);
  msgEl._hideTimer = setTimeout(() => {
    msgEl.classList.remove('show');
    senderEl.classList.remove('show');
    setEmotion(emotions.default);
  }, 8000);
}

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN';
  u.rate = 1.1;
  u.pitch = 1.1;
  u.volume = 1;
  const voices = speechSynthesis.getVoices();
  const zhVoice = voices.find(v => v.lang.startsWith('zh-CN') || v.lang.startsWith('zh-TW'));
  if (zhVoice) u.voice = zhVoice;
  window.speechSynthesis.speak(u);
}

const tapFaces = ['😊','😄','😉','😎','🥰','🤗','😆','😋','🤩','😇'];
faceEl.addEventListener('click', () => {
  faceEl.textContent = tapFaces[Math.floor(Math.random() * tapFaces.length)];
  faceEl.classList.remove('bounce');
  void faceEl.offsetWidth;
  faceEl.classList.add('bounce');
  tapHint.style.opacity = '0';
  setTimeout(() => setEmotion(emotions.default), 1500);
});

// ============================================================
// Poll: fast SHA check first → list+read only when new commits
// ============================================================
let seenIds = new Set();
let lastCommitSHA = null;
let debugLines = [];

const REFS_API = 'https://api.github.com/repos/jas0nawzffe/network-monitor/git/ref/heads/master';

function debugLog(msg, cls) {
  var now = new Date();
  var time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0') + ':' + now.getSeconds().toString().padStart(2,'0');
  debugLines.push('<span class=\"' + (cls || '') + '\">' + time + ' ' + msg + '</span>');
  if (debugLines.length > 8) debugLines.shift();
  document.getElementById('debugPanel').innerHTML = 'v10 · ' + debugLines.join('<br>');
}

function b64Decode(str) {
  try {
    return decodeURIComponent(atob(str).split('').map(c =>
      '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
    ).join(''));
  } catch(e) { return atob(str); }
}

// Helper: fetch with timeout, works on older Safari
function fetchWithTimeout(url, opts, ms) {
  const ctrl = new AbortController();
  const timer = setTimeout(function() { ctrl.abort(); }, ms);
  return fetch(url, Object.assign({}, opts, { signal: ctrl.signal })).finally(function () {
    clearTimeout(timer);
  });
}

function schedulePoll() {
  setTimeout(pollMessages, 1000);
}

async function pollMessages() {
  var hadError = false;
  try {
    // Step 1: Check if master has new commits (tiny response, ~300 bytes)
    var refR = await fetchWithTimeout(REFS_API, {
      headers: { 'Authorization': 'Bearer ' + TOKEN, 'Accept': 'application/vnd.github+json' }
    }, 10000);

    if (!refR.ok) { setOffline('ref:' + refR.status); hadError = true; debugLog('Refs API fail HTTP' + refR.status, 'err'); }
    else {
      var refData = await refR.json();
      var currentSHA = refData.object.sha;

      if (currentSHA === lastCommitSHA) {
        // No new commits — skip directory listing
        if (!hadError) { setOnline(); debugLog('SHA=' + currentSHA.slice(0,6) + ' 无变化 跳过', 'ok'); }
      } else {
        // New commit! Update SHA and check for new messages
        if (lastCommitSHA === null) debugLog('初始化 SHA=' + currentSHA.slice(0,6) + ' 首次拉取', 'ok');
        else debugLog('SHA变更! ' + (lastCommitSHA||'').slice(0,6) + '→' + currentSHA.slice(0,6) + ' 拉取目录', 'warn');
        lastCommitSHA = currentSHA;

        // Step 2: List message files
        var listR = await fetchWithTimeout(MSG_DIR, {
          headers: { 'Authorization': 'Bearer ' + TOKEN, 'Accept': 'application/vnd.github+json' }
        }, 12000);

        if (!listR.ok) { setOffline('list:' + listR.status); hadError = true; debugLog('List API fail HTTP' + listR.status, 'err'); }
        else {
          var files = await listR.json();
          if (!Array.isArray(files)) { setOffline('格式错误'); hadError = true; debugLog('List 返回格式错误', 'err'); }
          else {
            // Step 3: Filter — our channel + new (not seen)
            var newFiles = files.filter(function(f) {
              if (!f.name.startsWith('msg-')) return false;
              if (seenIds.has(f.name)) return false;
              return true;
            });
            if (newFiles.length > 0) {
              debugLog('发现' + newFiles.length + '条新消息', 'warn');
              // Step 4: Read new messages
              for (var i = 0; i < newFiles.length; i++) {
                var f = newFiles[i];
                try {
                  var fileR = await fetchWithTimeout(f.url, {
                    headers: { 'Authorization': 'Bearer ' + TOKEN, 'Accept': 'application/vnd.github+json' }
                  }, 10000);
                  if (!fileR.ok) { debugLog('读取文件失败 HTTP' + fileR.status, 'err'); continue; }
                  var fileData = await fileR.json();
                  var msg = JSON.parse(b64Decode(fileData.content));
                  seenIds.add(f.name);
                  if (msg.ch !== CHANNEL) continue;

                  debugLog('收到: ' + msg.text.slice(0, 15), 'ok');
                  var emotion = detectEmotion(msg.text);
                  setEmotion(emotion);
                  showMessage(msg.text, msg.sender);
                  if (msg.speak !== false) {
                    var prefix = msg.sender ? msg.sender + '说：' : '';
                    speak(prefix + msg.text);
                  }
                } catch (e) { debugLog('解析失败: ' + e.message, 'err'); }
              }

              // Step 5: Cleanup — keep only last 50 files
              if (files.length > 50) {
                var toDelete = files.slice(0, files.length - 50);
                for (var j = 0; j < toDelete.length; j++) {
                  var fd = toDelete[j];
                  fetch('https://api.github.com/repos/jas0nawzffe/network-monitor/contents/' + fd.path, {
                    method: 'DELETE',
                    headers: {
                      'Authorization': 'Bearer ' + TOKEN,
                      'Accept': 'application/vnd.github+json',
                      'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: 'cleanup old msg', sha: fd.sha })
                  }).catch(function(){});
                  seenIds.delete(fd.name);
                }
              }
            } else {
              debugLog('SHA变更但无本频道新消息', 'ok');
            }
            if (!hadError) setOnline();
          }
        }
      }
    }
  } catch (e) {
    setOffline('网络错误');
    debugLog('异常: ' + (e.message || 'unknown'), 'err');
  }
  schedulePoll();
}

function setOnline() {
  statusDot.className = 'dot online';
  statusText.textContent = '在线 · 等待消息';
}

function setOffline(reason) {
  statusDot.className = 'dot offline';
  statusText.textContent = '离线 · ' + (reason || '');
}

function requestWakeLock() {
  if ('wakeLock' in navigator) {
    navigator.wakeLock.request('screen').catch(() => {});
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        navigator.wakeLock.request('screen').catch(() => {});
      }
    });
  }
}

function init() {
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = () => {};
  pollMessages();
  requestWakeLock();
  setInterval(requestWakeLock, 60000);
  document.addEventListener('touchstart', () => { tapHint.style.opacity = '0'; }, { once: true });
}
init();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>

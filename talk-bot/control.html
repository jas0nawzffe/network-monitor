<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a14">
<link rel="manifest" href="manifest.json">
<title>小运 — 控制面板</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #0a0a14; color: #e0e0f0;
    -webkit-tap-highlight-color: transparent;
    display: flex; flex-direction: column; max-width: 500px; margin: 0 auto;
    min-height: 100vh;
  }

  /* Header */
  .header {
    padding: 16px 20px 12px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .header h1 { font-size: 1.2em; font-weight: 600; }
  .device-status { font-size: 0.78em; display: flex; align-items: center; gap: 6px; }
  .device-status .dot { width: 7px; height: 7px; border-radius: 50%;
    background: #e04040; transition: background 0.3s; }
  .device-status .dot.online { background: #00e5a0; box-shadow: 0 0 6px #00e5a0; }

  /* Sender input */
  .sender-row {
    padding: 8px 20px;
    display: flex; align-items: center; gap: 8px; font-size: 0.82em; color: #888;
  }
  .sender-row input {
    flex: 1; padding: 6px 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04); color: #ccc; font-size: 0.95em; font-family: inherit;
    outline: none; max-width: 120px;
  }
  .sender-row input::placeholder { color: #555; }

  /* Message history */
  .history {
    flex: 1; overflow-y: auto; padding: 12px 16px;
    display: flex; flex-direction: column; gap: 8px;
    -webkit-overflow-scrolling: touch;
  }
  .history::-webkit-scrollbar { width: 0; }
  .msg-bubble {
    padding: 10px 14px; border-radius: 14px; font-size: 0.92em; line-height: 1.4;
    max-width: 85%; word-break: break-word;
  }
  .msg-bubble.sent { align-self: flex-end; background: #1e3a5a; color: #c8d8f0; }
  .msg-bubble .sender-label { font-size: 0.75em; color: #6a8aaa; margin-bottom: 2px; }
  .empty-state { text-align: center; color: #3a3a5a; padding: 40px 20px; font-size: 0.9em; line-height: 1.6; }

  /* Quick messages */
  .quick-msgs {
    padding: 8px 16px 4px;
    display: flex; gap: 8px; overflow-x: auto; flex-wrap: wrap;
    -webkit-overflow-scrolling: touch;
  }
  .quick-msgs::-webkit-scrollbar { height: 0; }
  .quick-btn {
    flex: 0 0 auto; padding: 8px 14px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04); color: #aaa; font-size: 0.82em; font-family: inherit;
    cursor: pointer; white-space: nowrap; transition: all 0.15s;
  }
  .quick-btn:active { background: rgba(255,255,255,0.1); color: #fff; }

  /* Input area */
  .input-area {
    padding: 12px 16px max(16px, env(safe-area-inset-bottom));
    display: flex; gap: 8px; align-items: center; border-top: 1px solid rgba(255,255,255,0.05);
  }
  .input-area input {
    flex: 1; padding: 12px 16px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05); color: #e0e0f0; font-size: 0.95em; font-family: inherit;
    outline: none; transition: border 0.2s;
  }
  .input-area input:focus { border-color: rgba(255,255,255,0.2); }
  .input-area input::placeholder { color: #555; }
  .send-btn {
    width: 44px; height: 44px; border-radius: 50%; border: none;
    background: #1e5ae0; color: #fff; font-size: 1.2em; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .send-btn:active { opacity: 0.8; }
  .mic-btn {
    width: 44px; height: 44px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.1);
    background: transparent; color: #888; font-size: 1.2em; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .mic-btn.listening { background: #e04040; border-color: #e04040; color: #fff;
    animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(224,64,64,0.4); }
    50% { box-shadow: 0 0 0 12px rgba(224,64,64,0); } }

  /* Toast */
  .toast {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); z-index: 10;
    padding: 8px 20px; border-radius: 20px; background: rgba(0,229,160,0.15);
    color: #00e5a0; font-size: 0.82em; pointer-events: none;
    opacity: 0; transition: opacity 0.3s;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="header">
  <h1>📡 小运控制台</h1>
  <div class="device-status"><span class="dot" id="statusDot"></span><span id="statusText">连接中...</span></div>
</div>
<div class="sender-row">发送者：<input id="senderName" type="text" placeholder="你的昵称" maxlength="10"></div>
<div class="history" id="history"><div class="empty-state">💬 在这里发消息<br>家里的装置会说出来</div></div>
<div class="quick-msgs" id="quickMsgs"></div>
<div class="input-area">
  <button class="mic-btn" id="micBtn" title="语音输入">🎤</button>
  <input id="msgInput" type="text" placeholder="输入消息..." maxlength="200" enterkeyhint="send">
  <button class="send-btn" id="sendBtn">➤</button>
</div>
<div class="toast" id="toast"></div>

<script>
// ============================================================
// CONTROL PANEL — jsonblob.com HTTP relay
// ============================================================

const CHANNEL = 'yunqi-talkbot-' + (new URLSearchParams(location.search).get('ch') || 'home');
const API_BASE = 'https://jsonblob.com/api/jsonBlob';
let blobId = localStorage.getItem('tb-blob-' + CHANNEL);

// DOM
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const historyEl = document.getElementById('history');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const micBtn = document.getElementById('micBtn');
const quickMsgs = document.getElementById('quickMsgs');
const senderName = document.getElementById('senderName');
const toast = document.getElementById('toast');

// Quick messages
const quickMessages = [
  '加油！你最棒了！',
  '吃饭了吗？🍚',
  '该喝水啦～',
  '晚安，好梦 🌙',
  '早上好！新的一天！',
  '想你啦 ❤️',
  '你真优秀！👏',
  '记得休息一下～',
  '今天开心吗？',
  '你是最厉害的！',
  '摸摸头 🤗',
  '该起来活动啦',
];
quickMsgs.innerHTML = quickMessages.map(m => '<button class="quick-btn">' + m + '</button>').join('');
quickMsgs.addEventListener('click', e => {
  if (e.target.classList.contains('quick-btn')) {
    sendMessage(e.target.textContent);
    e.target.style.background = 'rgba(255,255,255,0.1)';
    setTimeout(() => { e.target.style.background = ''; }, 200);
  }
});

// Message history
let msgHistory = [];
const MAX_HISTORY = 50;

function addToHistory(text, sender) {
  msgHistory.push({ text, sender, ts: Date.now() });
  if (msgHistory.length > MAX_HISTORY) msgHistory.shift();
  renderHistory();
}

function renderHistory() {
  if (msgHistory.length === 0) {
    historyEl.innerHTML = '<div class="empty-state">💬 在这里发消息<br>家里的装置会说出来</div>';
    return;
  }
  historyEl.innerHTML = msgHistory.map(m => {
    const s = m.sender ? '<div class="sender-label">' + escHtml(m.sender) + '</div>' : '';
    return '<div class="msg-bubble sent">' + s + escHtml(m.text) + '</div>';
  }).join('');
  historyEl.scrollTop = historyEl.scrollHeight;
}

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// Toast
let toastTimer;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
}

// ============================================================
// JSON Blob relay
// ============================================================

async function ensureBlob() {
  if (blobId) return blobId;
  const r = await fetch(API_BASE, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages: [] })
  });
  if (!r.ok) throw new Error('Cannot create blob');
  const location = r.headers.get('Location');
  blobId = location.split('/').pop();
  localStorage.setItem('tb-blob-' + CHANNEL, blobId);
  return blobId;
}

async function sendMessage(text) {
  if (!text || !text.trim()) return;
  const sender = senderName.value.trim() || '';

  try {
    await ensureBlob();
    // Read current blob, append message, write back
    const r = await fetch(API_BASE + '/' + blobId, {
      signal: AbortSignal.timeout(10000)
    });
    if (!r.ok) {
      if (r.status === 404 || r.status === 410) {
        blobId = null;
        localStorage.removeItem('tb-blob-' + CHANNEL);
      }
      showToast('发送失败，请重试');
      return;
    }
    const data = await r.json();
    const msgs = data.messages || [];
    const newMsg = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
      text: text.trim(),
      sender,
      ts: Date.now(),
      speak: true
    };
    msgs.push(newMsg);
    // Keep only last 20 messages to avoid blob getting too large
    while (msgs.length > 20) msgs.shift();

    const putR = await fetch(API_BASE + '/' + blobId, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: msgs })
    });
    if (!putR.ok) {
      showToast('发送失败，请重试');
      return;
    }
    addToHistory(text.trim(), sender);
    updateStatus(true);
  } catch (e) {
    showToast('网络错误，请重试');
    updateStatus(false);
  }
}

sendBtn.addEventListener('click', () => {
  sendMessage(msgInput.value);
  msgInput.value = '';
  msgInput.focus();
});

msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    sendMessage(msgInput.value);
    msgInput.value = '';
  }
});

// ============================================================
// Polling (for device online status)
// ============================================================
let pollTimer;

async function pollStatus() {
  try {
    if (!blobId) { updateStatus(false); return; }
    const r = await fetch(API_BASE + '/' + blobId, {
      signal: AbortSignal.timeout(10000)
    });
    if (!r.ok) {
      if (r.status === 404 || r.status === 410) {
        blobId = null;
        localStorage.removeItem('tb-blob-' + CHANNEL);
      }
      updateStatus(false);
      return;
    }
    updateStatus(true);
  } catch (e) {
    updateStatus(false);
  }
  pollTimer = setTimeout(pollStatus, 5000);
}

function updateStatus(online) {
  statusDot.className = 'dot' + (online ? ' online' : '');
  statusText.textContent = online ? '已连接' : '离线';
}

// ============================================================
// Voice input
// ============================================================
let recognition = null;
let isListening = false;

if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'zh-CN';
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript;
    msgInput.value = text;
    isListening = false;
    micBtn.classList.remove('listening');
    sendMessage(text);
    msgInput.value = '';
  };

  recognition.onerror = () => {
    isListening = false;
    micBtn.classList.remove('listening');
    showToast('语音识别失败，请打字输入');
  };

  recognition.onend = () => {
    isListening = false;
    micBtn.classList.remove('listening');
  };

  micBtn.addEventListener('click', () => {
    if (isListening) {
      recognition.stop();
    } else {
      recognition.start();
      isListening = true;
      micBtn.classList.add('listening');
    }
  });
} else {
  micBtn.style.display = 'none';
}

// ============================================================
// Init
// ============================================================
function init() {
  pollStatus();
  msgInput.focus();
}
init();

// Register SW
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
